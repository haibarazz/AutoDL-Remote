<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F7FEE7"/>
    </linearGradient>
    <linearGradient id="local" x1="92" y1="96" x2="372" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="bridge" x1="492" y1="130" x2="788" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="remote" x1="908" y1="96" x2="1188" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="1280" height="520" rx="36" fill="url(#bg)"/>
  <rect x="38" y="38" width="1204" height="444" rx="28" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="640" y="74" text-anchor="middle" fill="#0F172A" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="800">AutoDL Remote</text>
  <text x="640" y="110" text-anchor="middle" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">本地 Codex 写代码，远端 GPU 跑任务，SSH 负责连接</text>

  <g filter="url(#shadow)">
    <rect x="90" y="152" width="286" height="212" rx="24" fill="url(#local)" stroke="#93C5FD" stroke-width="2"/>
    <rect x="120" y="184" width="226" height="116" rx="14" fill="#FFFFFF" stroke="#60A5FA"/>
    <rect x="140" y="206" width="110" height="12" rx="6" fill="#2563EB"/>
    <rect x="140" y="232" width="168" height="10" rx="5" fill="#93C5FD"/>
    <rect x="140" y="256" width="136" height="10" rx="5" fill="#93C5FD"/>
    <text x="233" y="333" text-anchor="middle" fill="#1E3A8A" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">Local Codex</text>
    <text x="233" y="356" text-anchor="middle" fill="#1D4ED8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">代码修改与 Git diff 留在本地</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="492" y="170" width="296" height="176" rx="26" fill="url(#bridge)" stroke="#F59E0B" stroke-width="2"/>
    <rect x="548" y="215" width="184" height="56" rx="28" fill="#111827"/>
    <text x="640" y="252" text-anchor="middle" fill="#FFFFFF" font-family="SFMono-Regular,Consolas,monospace" font-size="24" font-weight="800">ssh / scp</text>
    <text x="640" y="310" text-anchor="middle" fill="#78350F" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="23" font-weight="800">显式工具层</text>
    <text x="640" y="334" text-anchor="middle" fill="#92400E" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">exec · put · get · tree · tail</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="904" y="152" width="286" height="212" rx="24" fill="url(#remote)" stroke="#4ADE80" stroke-width="2"/>
    <rect x="935" y="184" width="224" height="116" rx="14" fill="#FFFFFF" stroke="#22C55E"/>
    <rect x="957" y="209" width="180" height="18" rx="9" fill="#16A34A"/>
    <rect x="957" y="243" width="70" height="36" rx="9" fill="#BBF7D0"/>
    <rect x="1043" y="243" width="94" height="36" rx="9" fill="#86EFAC"/>
    <text x="1047" y="333" text-anchor="middle" fill="#14532D" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">AutoDL GPU</text>
    <text x="1047" y="356" text-anchor="middle" fill="#15803D" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">模型、数据、训练产物留在远端</text>
  </g>

  <path d="M390 226C423 210 454 210 484 226" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="438" y="202" text-anchor="middle" fill="#1D4ED8" font-family="SFMono-Regular,Consolas,monospace" font-size="17" font-weight="700">put / sync-up</text>

  <path d="M890 292C856 308 823 308 794 292" stroke="#16A34A" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow2)"/>
  <text x="842" y="333" text-anchor="middle" fill="#15803D" font-family="SFMono-Regular,Consolas,monospace" font-size="17" font-weight="700">get / cat / tail</text>

  <path d="M790 226C823 210 856 210 890 226" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="840" y="202" text-anchor="middle" fill="#1D4ED8" font-family="SFMono-Regular,Consolas,monospace" font-size="17" font-weight="700">exec</text>

  <path d="M484 292C454 308 423 308 390 292" stroke="#16A34A" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow2)"/>
  <text x="438" y="333" text-anchor="middle" fill="#15803D" font-family="SFMono-Regular,Consolas,monospace" font-size="17" font-weight="700">result when needed</text>

  <rect x="253" y="421" width="774" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="640" y="448" text-anchor="middle" fill="#334155" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">插件不判断谁覆盖谁，只给 Codex 提供可组合的 SSH 原语</text>
</svg>
